<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  /* Suite */
  .suite { margin-bottom: 10px; }

  /* Sandbox DOM */
  #sandbox { position: absolute; left: -9999px; top: 0; width: 1200px; }
  /* Progress */
  .prog-wrap { height: 20px; background: #fff; border: 2px inset #888; position: relative; margin: 8px 0; }
  .prog-bar {
    height: 100%;
    background: repeating-linear-gradient(-45deg, var(--navy) 0, var(--navy) 8px, #1a6aff 8px, #1a6aff 16px);
    transition: width 0.3s;
  }
  .prog-text {
    position: absolute; inset: 0; font-family: 'VT323', monospace;
    font-size: 14px; color: #fff; text-align: center;
    text-shadow: 1px 1px 0 #000;
  }
  marquee { background:#000; color:var(--log-text); font-family:'VT323',monospace; font-size:18px; padding:3px 0; border:2px inset #888; margin-bottom:10px; }
</style>
</head>
<body>
<marquee scrollamount="3">🧪 ENTO-PROFESSO SEARCH 3000 TEST HARNESS 🧪 RUNNING AUTOMATED QUALITY ASSURANCE SINCE 1997 🧪 ALL SYSTEMS NOMINAL 🧪</marquee>

<div class="win">
  <div class="win-title">
    <span>🧪 Ento-Professo Search 3000 — Test Harness v1.0</span>
    <div style="display:flex;gap:4px;">
      <div style="width:16px;height:14px;background:var(--bg);border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #444;border-bottom:1px solid #444;font-size:10px;text-align:center;cursor:pointer;">_</div>
      <div style="width:16px;height:14px;background:var(--bg);border-top:1px solid #fff;border-left:1px solid #fff;border-right:1px solid #444;border-bottom:1px solid #444;font-size:10px;text-align:center;cursor:pointer;">□</div>

    <div class="win" style="margin-top:10px;">

    </div>

<!-- Hidden sandbox for DOM tests -->
<div id="sandbox"></div>

<script>
"use strict";

// ═══════════════════════════════════════════════════════════
//  MINI TEST RUNNER
// ═══════════════════════════════════════════════════════════
const _suites = [];
let _results = [];

function describe(name, fn) {
  const suite = { name, tests: [] };
  const it = (testName, testFn) => suite.tests.push({ name: testName, fn: testFn });
  fn(it);
  _suites.push(suite);
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || "Assertion failed");
}
function assertEqual(a, b, msg) {
  const aStr = JSON.stringify(a), bStr = JSON.stringify(b);
  if (aStr !== bStr) throw new Error((msg || "assertEqual") + `\n  expected: ${bStr}\n  got:      ${aStr}`);
}
function assertContains(str, sub, msg) {
  if (!String(str).includes(sub)) throw new Error((msg || "assertContains") + `\n  "${sub}" not found in "${str}"`);
}
function assertNotContains(str, sub, msg) {
  if (String(str).includes(sub)) throw new Error((msg || "assertNotContains") + `\n  "${sub}" unexpectedly found in "${str}"`);
}
function assertMatch(str, re, msg) {
  if (!re.test(str)) throw new Error((msg || "assertMatch") + `\n  /${re.source}/ did not match "${str}"`);
}
function assertThrows(fn, msg) {
  try { fn(); } catch { return; }
  throw new Error(msg || "Expected function to throw");
}
async function assertRejects(fn, msg) {
  try { await fn(); } catch { return; }
  throw new Error(msg || "Expected async function to reject");
}

function tlog(msg) {
  const box = document.getElementById("test-log");
  if (!box) return;
  const ts = new Date().toLocaleTimeString();
  box.textContent += `[${ts}] ${msg}\n`;
  box.scrollTop = box.scrollHeight;
}

async function runAll(failedOnly = false) {
  _results = [];
  clearResults();
  document.getElementById("progWrap").style.display = "";
  tlog("═══ Starting test run ═══");

  const allTests = _suites.flatMap(s => s.tests.map(t => ({ suite: s.name, ...t })));
  const toRun = failedOnly
    ? allTests.filter(t => {
        const prev = document.querySelector(`[data-test="${CSS.escape(t.suite + ":" + t.name)}"]`);
        return prev ? prev.classList.contains("fail") : true;
      })
    : allTests;

  let passed = 0, failed = 0;

  for (let i = 0; i < toRun.length; i++) {
    const t = toRun[i];
    const pct = Math.round((i / toRun.length) * 100);
    document.getElementById("progBar").style.width = pct + "%";
    document.getElementById("progText").textContent = `${pct}% — ${t.suite} / ${t.name}`;

    let status = "pass", detail = "";
    try {
      await t.fn();
      passed++;
      tlog(`  ✔ ${t.suite} › ${t.name}`);
    } catch(e) {
      status = "fail";
      detail = e.message;
      failed++;
      tlog(`  ✘ ${t.suite} › ${t.name}\n    ${e.message}`);
    }
    _results.push({ suite: t.suite, name: t.name, status, detail });
  }

  document.getElementById("progBar").style.width = "100%";
  document.getElementById("progText").textContent = "Done!";
  setTimeout(() => { document.getElementById("progWrap").style.display = "none"; }, 1000);

  renderResults(_results);
  const sumEl = document.getElementById("summary");
  const total = passed + failed;
  sumEl.innerHTML = `
    <span class="sum-pass">✔ PASS: ${passed}</span>
    <span class="${failed > 0 ? "sum-fail" : "sum-pass"}">✘ FAIL: ${failed}</span>
    <span class="sum-total">TOTAL: ${total}</span>
    <span style="font-size:14px;color:#555;">${new Date().toLocaleTimeString()}</span>
  `;
  tlog(`═══ Done: ${passed} passed, ${failed} failed out of ${total} ═══`);
}

function renderResults(results) {
  const container = document.getElementById("suites-container");
  container.innerHTML = "";
  const bySuite = {};
  for (const r of results) {
    if (!bySuite[r.suite]) bySuite[r.suite] = [];
    bySuite[r.suite].push(r);
  }
  for (const [suiteName, tests] of Object.entries(bySuite)) {
    const passCount = tests.filter(t => t.status === "pass").length;
    const div = document.createElement("div");
    div.className = "suite win";
    div.innerHTML = `
      <div class="suite-title" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'':'none'">
        <span>${suiteName}</span>
        <span>${passCount}/${tests.length} passed</span>
      </div>
      <div class="suite-body">
        ${tests.map(t => `
          <div class="test-row ${t.status}" data-test="${escHtml(suiteName + ":" + t.name)}">
            <span class="status-icon">${t.status === "pass" ? "✔" : t.status === "fail" ? "✘" : "—"}</span>
            <div class="test-name">
              ${escHtml(t.name)}
              ${t.detail ? `<div class="test-detail">${escHtml(t.detail)}</div>` : ""}
            </div>
          </div>`).join("")}
      </div>`;
    container.appendChild(div);
  }
}

function clearResults() {
  document.getElementById("suites-container").innerHTML = "";
  document.getElementById("summary").textContent = "No tests run yet.";
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ═══════════════════════════════════════════════════════════
//  MOCK STORAGE (mirrors entoprofesso.html window.storage impl)
// ═══════════════════════════════════════════════════════════
const _mockStore = {};
const mockStorage = {
  async get(key) {
    return _mockStore[key] !== undefined ? { value: _mockStore[key] } : null;
  },
  async set(key, value) { _mockStore[key] = value; },
  async delete(key) { delete _mockStore[key]; }
};

function clearMockStore() {
  Object.keys(_mockStore).forEach(k => delete _mockStore[k]);
}

// ═══════════════════════════════════════════════════════════
//  HELPERS — core functions inlined for isolated testing
//  (mirrors entoprofesso.html logic exactly)
// ═══════════════════════════════════════════════════════════
function escapeHtml(str) {
  if (str == null) return "";
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");
}

function safeUrl(url) {
  if (!url) return null;
  const s = String(url).trim().replace(/\s/g, "").toLowerCase();
  if (s.startsWith("javascript:") || s.startsWith("data:") || s.startsWith("vbscript:")) return null;
  return url;
}

function buildProfTable(profs) {
  if (!profs || profs.length === 0) {
    return '<div class="no-results">⚠ No faculty data found for this school.</div>';
  }
  const rows = profs.map(p => {
    const research = Array.isArray(p.research) ? p.research : [];
    const email = p.email ? `<a href="mailto:${escapeHtml(p.email)}">${escapeHtml(p.email)}</a>` : "—";
    const cleanUrl = safeUrl(p.profileUrl);
    const profile = cleanUrl ? `<a href="${escapeHtml(cleanUrl)}" target="_blank" rel="noopener">🔗 Profile</a>` : "—";
    return `<tr>
      <td><b>${escapeHtml(p.name||"—")}</b></td>
      <td>${escapeHtml(p.title||"—")}</td>
      <td>${research.map(r=>`<span class="tag-research">${escapeHtml(r)}</span>`).join(" ")||"—"}</td>
      <td>${email}</td>
      <td>${escapeHtml(p.phone||"—")}</td>
      <td>${profile}</td>
    </tr>`;
  }).join("");
  return `<div class="prof-table-wrap"><table>
    <thead><tr><th>Name</th><th>Title</th><th>Research Areas</th><th>Email</th><th>Phone</th><th>Profile</th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div>`;
}

function buildCSV(schools, exportData) {
  const rows = [["School","Name","Title","Research Areas","Email","Phone","Profile URL"]];
  for (const { school, data } of exportData) {
    if (!data || data.status === "error" || !data.professors) continue;
    for (const p of data.professors) {
      rows.push([
        school,
        p.name||"", p.title||"",
        (Array.isArray(p.research)?p.research:[]).join("; "),
        p.email||"", p.phone||"", p.profileUrl||""
      ]);
    }
  }
  return rows.map(r => r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
}

function extractText(data) {
  return (data.content || []).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

async function storageGet(key) {
  try {
    const r = await mockStorage.get("school:" + key);
    return r ? JSON.parse(r.value) : null;
  } catch { return null; }
}
async function storageSet(key, data) {
  await mockStorage.set("school:" + key, JSON.stringify(data));
}
async function storageDel(key) {
  await mockStorage.delete("school:" + key);
}

// ═══════════════════════════════════════════════════════════
//  SEARCH helper — runs applySearch logic against a sandbox DOM
// ═══════════════════════════════════════════════════════════
function buildSandboxDOM(schools) {
  const sb = document.getElementById("sandbox");
  sb.innerHTML = "";
  const container = document.createElement("div");
  container.id = "schools-container-test";
  for (const { name, profs } of schools) {
    const id = "card_" + name.replace(/\W/g,"_");
    const card = document.createElement("div");
    card.id = id;
    card.innerHTML = buildProfTable(profs);
    container.appendChild(card);
  }
  sb.appendChild(container);
  return container;
}

function applySearchTest(container, term) {
  const schools = [...container.children].map(c => c.id);
  const q = term.toLowerCase().trim();
  let totalVisible = 0, totalRows = 0;
  for (const id of schools) {
    const card = container.querySelector("#" + id);
    if (!card) continue;
    card.querySelectorAll(".search-no-results").forEach(el => el.remove());
    const rows = card.querySelectorAll("tbody tr");
    if (!rows.length) continue;
    let schoolVisible = 0;
    rows.forEach(row => {
      const match = !q || row.textContent.toLowerCase().includes(q);
      row.style.display = match ? "" : "none";
      if (match) schoolVisible++;
    });
    totalRows += rows.length;
    totalVisible += schoolVisible;
    if (q && schoolVisible === 0) {
      const tableWrap = card.querySelector(".prof-table-wrap");
      if (tableWrap) {
        const msg = document.createElement("div");
        msg.className = "search-no-results";
        msg.textContent = `⚠ No professors match "${term}" at this school.`;
        tableWrap.after(msg);
      }
    }
  }
  return { totalVisible, totalRows };
}

// Mock API response helpers
function mockApiOk(text) {
  return { content: [{ type: "text", text }] };
}

// ═══════════════════════════════════════════════════════════
//  SUITE 1 — Storage
// ═══════════════════════════════════════════════════════════
describe("1. Storage", it => {
  it("set and get a value", async () => {
    clearMockStore();
    await mockStorage.set("test-key", "hello");
    const r = await mockStorage.get("test-key");
    assert(r !== null, "Expected result");
    assertEqual(r.value, "hello");
  });

  it("get a missing key returns null", async () => {
    clearMockStore();
    const r = await mockStorage.get("does-not-exist");
    assertEqual(r, null);
  });

  it("delete removes a key", async () => {
    clearMockStore();
    await mockStorage.set("del-key", "value");
    await mockStorage.delete("del-key");
    const r = await mockStorage.get("del-key");
    assertEqual(r, null);
  });

  it("delete on missing key does not throw", async () => {
    clearMockStore();
    await mockStorage.delete("ghost-key"); // should not throw
  });

  it("stores school JSON round-trip", async () => {
    clearMockStore();
    const data = { status: "ok", professors: [{ name: "Dr. Bug", email: "bug@uni.edu" }] };
    await storageSet("Cornell University", data);
    const back = await storageGet("Cornell University");
    assertEqual(back.professors[0].name, "Dr. Bug");
  });

  it("multiple schools are stored independently", async () => {
    clearMockStore();
    await storageSet("School A", { status: "ok", professors: [{ name: "Alice" }] });
    await storageSet("School B", { status: "ok", professors: [{ name: "Bob" }, { name: "Carol" }] });
    const a = await storageGet("School A");
    const b = await storageGet("School B");
    assertEqual(a.professors.length, 1);
    assertEqual(b.professors.length, 2);
  });

  it("clearing one school does not affect another", async () => {
    clearMockStore();
    await storageSet("School A", { status: "ok", professors: [{ name: "Alice" }] });
    await storageSet("School B", { status: "ok", professors: [{ name: "Bob" }] });
    await storageDel("School A");
    const a = await storageGet("School A");
    const b = await storageGet("School B");
    assertEqual(a, null);
    assertEqual(b.professors[0].name, "Bob");
  });

  it("overwriting a key replaces the value", async () => {
    clearMockStore();
    await storageSet("UF", { status: "ok", professors: [] });
    await storageSet("UF", { status: "ok", professors: [{ name: "New Prof" }] });
    const d = await storageGet("UF");
    assertEqual(d.professors.length, 1);
  });
});

// ═══════════════════════════════════════════════════════════
//  SUITE 2 — buildProfTable
// ═══════════════════════════════════════════════════════════
describe("2. buildProfTable", it => {
  it("empty array shows no-results div", () => {
    const html = buildProfTable([]);
    assertContains(html, "no-results");
    assertContains(html, "No faculty data found");
  });

  it("null input shows no-results div", () => {
    const html = buildProfTable(null);
    assertContains(html, "No faculty data found");
  });

  it("single professor renders one row", () => {
    const html = buildProfTable([{ name: "Dr. Ant", title: "Professor", research: [], email: null, phone: null, profileUrl: null }]);
    assertContains(html, "Dr. Ant");
    assertContains(html, "<table");
    assertContains(html, "<tr");
  });

  it("email renders as mailto link", () => {
    const html = buildProfTable([{ name: "Dr. Fly", email: "fly@bug.edu", research: [] }]);
    assertContains(html, 'href="mailto:fly@bug.edu"');
  });

  it("no email shows dash", () => {
    const html = buildProfTable([{ name: "Dr. Fly", email: null, research: [] }]);
    assertMatch(html, /\<td\>—\<\/td\>/);
  });

  it("profileUrl renders as link", () => {
    const html = buildProfTable([{ name: "Dr. Moth", profileUrl: "https://uni.edu/moth", research: [] }]);
    assertContains(html, 'href="https://uni.edu/moth"');
    assertContains(html, "🔗 Profile");
  });

  it("no profileUrl shows dash", () => {
    const html = buildProfTable([{ name: "Dr. Moth", profileUrl: null, research: [] }]);
    assertMatch(html, /\<td\>—\<\/td\>/);
  });

  it("research tags are rendered as spans", () => {
    const html = buildProfTable([{ name: "Dr. Bee", research: ["pollination", "colony collapse"] }]);
    assertContains(html, "pollination");
    assertContains(html, "colony collapse");
    assertContains(html, "tag-research");
  });

  it("null research field does not throw", () => {
    const html = buildProfTable([{ name: "Dr. Gnat", research: null }]);
    assertContains(html, "Dr. Gnat");
  });

  it("HTML characters in name are escaped", () => {
    const html = buildProfTable([{ name: '<script>alert(1)<\/script>', research: [] }]);
    assertNotContains(html, '<script>');
    assertContains(html, "&lt;script&gt;");
  });

  it("HTML in email is escaped", () => {
    const html = buildProfTable([{ name: "X", email: '"><img src=x onerror=alert(1)>', research: [] }]);
    // The dangerous chars must be HTML-entity-encoded (< becomes &lt;), never left raw
    assertContains(html, '&lt;img');
    assertNotContains(html, '<img ');   // no raw unescaped tag
  });

  it("HTML in profileUrl is escaped in href", () => {
    const html = buildProfTable([{ name: "X", profileUrl: 'javascript:alert(1)', research: [] }]);
    // safeUrl() must strip javascript: — the link should fall back to "—"
    assertNotContains(html, 'href="javascript:');
    assertContains(html, '—');
  });

  it("multiple professors render multiple rows", () => {
    const html = buildProfTable([
      { name: "Prof A", research: [] },
      { name: "Prof B", research: [] },
      { name: "Prof C", research: [] },
    ]);
    const matches = html.match(/<tr>/g);
    assert(matches && matches.length >= 3, "Expected 3+ <tr> elements");
  });

  it("contains correct table headers", () => {
    const html = buildProfTable([{ name: "X", research: [] }]);
    assertContains(html, "Name");
    assertContains(html, "Title");
    assertContains(html, "Research Areas");
    assertContains(html, "Email");

// ═══════════════════════════════════════════════════════════
//  SUITE 7 — Hit Counter Logic
// ═══════════════════════════════════════════════════════════
describe("7. Hit Counter", it => {
  async function countProfs(schoolMap) {
    clearMockStore();
    for (const [name, data] of Object.entries(schoolMap)) {
      if (data !== null) await storageSet(name, data);
    }
    const counts = await Promise.all(
      Object.keys(schoolMap).map(async name => {
        const d = await storageGet(name);
        return (d && d.professors) ? d.professors.length : 0;
      })
    );
    return counts.reduce((a, b) => a + b, 0);
  }

  it("counts professors from a single school", async () => {
    const total = await countProfs({
      "School A": { status: "ok", professors: [{ name: "P1" }, { name: "P2" }] }
    });
    assertEqual(total, 2);
  });

  it("aggregates across multiple schools", async () => {
    const total = await countProfs({
      "School A": { status: "ok", professors: [{ name: "P1" }, { name: "P2" }] },
      "School B": { status: "ok", professors: [{ name: "P3" }] },
    });
    assertEqual(total, 3);
  });

  it("schools with no cache contribute 0", async () => {
    const total = await countProfs({
      "Cached School": { status: "ok", professors: [{ name: "P1" }] },
      "Empty School": null,
    });
    assertEqual(total, 1);
  });

  it("error-status schools contribute 0", async () => {
    const total = await countProfs({
      "Error School": { status: "error", professors: undefined },
    });
    assertEqual(total, 0);
  });

  it("school with empty professors array contributes 0", async () => {
    const total = await countProfs({
      "Ghost School": { status: "ok", professors: [] },
    });
    assertEqual(total, 0);
  });

  it("counter is correct after clearing one school", async () => {
    clearMockStore();
    await storageSet("A", { status: "ok", professors: [{ name: "P1" }] });
    await storageSet("B", { status: "ok", professors: [{ name: "P2" }, { name: "P3" }] });
    await storageDel("A");
    const count = await countProfs({ A: null, B: { status: "ok", professors: [{ name: "P2" }, { name: "P3" }] } });
    assertEqual(count, 2);
  });
});

// ═══════════════════════════════════════════════════════════
//  SUITE 9 — Agent JSON Parsing Logic
// ═══════════════════════════════════════════════════════════
describe("9. Agent JSON Parsing", it => {
  // Mimics agent1_findProgramPage parse logic
  function parseAgent1(text) {
    const clean = text.replace(/```json|```/g, "").trim();
    try {
      const parsed = JSON.parse(clean);
      return parsed.programUrl || "FALLBACK";
    } catch {
      const match = text.match(/https?:\/\/[^\s"'<>]+/);
      return match ? match[0] : "FALLBACK";
    }
  }

  // Mimics agent2_findFaculty parse logic
  function parseAgent2(text) {
    const clean = text.replace(/```json|```/g, "").trim();
    try {
      const arrMatch = clean.match(/\[[\s\S]*\]/);
      if (arrMatch) return JSON.parse(arrMatch[0]);
      return JSON.parse(clean);
    } catch { return []; }
  }

  it("agent1 parses clean JSON", () => {
    const url = parseAgent1('{"programUrl":"https://uni.edu/grad"}');
    assertEqual(url, "https://uni.edu/grad");
  });

  it("agent1 strips markdown fences", () => {
    const url = parseAgent1('```json\n{"programUrl":"https://uni.edu/grad"}\n```');
    assertEqual(url, "https://uni.edu/grad");
  });

  it("agent1 falls back to URL extraction on bad JSON", () => {
    const url = parseAgent1("Sure! The page is at https://uni.edu/grad/programs.");
    assertEqual(url, "https://uni.edu/grad/programs.");
  });

  it("agent1 returns FALLBACK when no URL found", () => {
    const url = parseAgent1("I couldn't find anything.");
    assertEqual(url, "FALLBACK");
  });

  it("agent2 parses clean JSON array", () => {
    const result = parseAgent2('[{"name":"Dr. X","profileUrl":"https://x.edu"}]');
    assertEqual(result.length, 1);
    assertEqual(result[0].name, "Dr. X");
  });

  it("agent2 strips markdown fences", () => {
    const result = parseAgent2('```json\n[{"name":"Dr. Y"}]\n```');
    assertEqual(result.length, 1);
    assertEqual(result[0].name, "Dr. Y");
  });

  it("agent2 extracts array from prose response", () => {
    const result = parseAgent2('Here are the faculty:\n[{"name":"Dr. Z"}]\nEnd.');
    assertEqual(result.length, 1);
    assertEqual(result[0].name, "Dr. Z");
  });

  it("agent2 returns empty array on parse failure", () => {
    const result = parseAgent2("I could not find faculty data.");
    assertEqual(result, []);
  });

  it("agent3 batch fallback returns names from input", () => {
    // Mimics the catch block in agent3_batch
    const batch = [{ name: "Dr. Ant", profileUrl: "https://x.edu" }, { name: "Dr. Bee", profileUrl: null }];
    const fallback = batch.map(f => ({
      name: f.name || "Unknown",
      title: null, research: [], email: null, phone: null,
      profileUrl: f.profileUrl || null
    }));
    assertEqual(fallback[0].name, "Dr. Ant");
    assertEqual(fallback[1].profileUrl, null);
    assertEqual(fallback[0].research, []);
  });

  it("agent3 parses full professor objects", () => {
    const json = JSON.stringify([{
      name: "Dr. Moth",
      title: "Professor of Entomology",
      research: ["lepidoptera", "migration"],
      email: "moth@uni.edu",
      phone: "555-9999",
      profileUrl: "https://uni.edu/moth"
    }]);
    const parsed = JSON.parse(json);
    assertEqual(parsed[0].research.length, 2);
    assertEqual(parsed[0].email, "moth@uni.edu");
  });
});

describe("10. Badge & Progress DOM State", it => {
  function setupBadge() {
    const sb = document.getElementById("sandbox");
    const id = "test_badge_school";
    const div = document.createElement("div");
    div.innerHTML = `
      <span class="badge badge-idle" id="badge_${id}">⬜ Not Searched</span>
      <div id="progress_${id}"></div>
    `;
    sb.appendChild(div);
    return id;
  }

  function setBadge(id, cls, text) {
    const el = document.getElementById("badge_" + id);
    if (el) { el.className = "badge " + cls; el.textContent = text; }
  }

  function setProgress(id, pct, label) {
    const el = document.getElementById("progress_" + id);
    if (!el) return;
    if (pct >= 100) { el.innerHTML = ""; return; }
    el.innerHTML = `<div class="progress-wrap">
      <div class="progress-bar" style="width:${pct}%"></div>
      <div class="progress-text">${label}</div>
    </div>`;
  }

  it("badge starts as badge-idle", () => {

  it("setBadge changes class to badge-loading", () => {

    setBadge(id, "badge-loading", "⏳ Loading...");
    const el = document.getElementById("badge_" + id);
    assert(el.classList.contains("badge-loading"), "Expected badge-loading");
    assertEqual(el.textContent, "⏳ Loading...");
  });

  it("setBadge changes class to badge-success", () => {

    setBadge(id, "badge-success", "✅ 5 profs");

    assert(el.classList.contains("badge-success"), "Expected badge-success");
  });

  it("setBadge changes class to badge-error", () => {
    const id = setupBadge();
    setBadge(id, "badge-error", "❌ Error");
    const el = document.getElementById("badge_" + id);
    assert(el.classList.contains("badge-error"), "Expected badge-error");
  });

  it("setBadge changes class to badge-cached", () => {
    const id = setupBadge();
    setBadge(id, "badge-cached", "✅ cached");
    const el = document.getElementById("badge_" + id);
    assert(el.classList.contains("badge-cached"), "Expected badge-cached");
  });

  it("setProgress renders progress bar at 50%", () => {
    const id = setupBadge();
    setProgress(id, 50, "Halfway!");
    const el = document.getElementById("progress_" + id);
    const bar = el.querySelector(".progress-bar");
    assert(bar !== null, "Expected .progress-bar");
    assertContains(bar.style.width, "50%");
  });

  it("setProgress at 0% renders bar", () => {
    const id = setupBadge();
    setProgress(id, 0, "Starting...");
    const el = document.getElementById("progress_" + id);
    assert(el.innerHTML.length > 0, "Expected progress HTML");
  });

  it("setProgress at 100% clears the element", () => {
    const id = setupBadge();
    setProgress(id, 50, "Halfway");
    setProgress(id, 100, "Done!");
    const el = document.getElementById("progress_" + id);
    assertEqual(el.innerHTML, "");

  it("progress text label is displayed", () => {

  it("badge text updates correctly", () => {

// ═══════════════════════════════════════════════════════════
//  SUITE 14 — Agent 1 gradUrl Short-Circuit Logic
// ═══════════════════════════════════════════════════════════
describe("14. Agent 1 gradUrl Short-Circuit", it => {
  // Mimics entoprofesso.html agent1_findProgramPage short-circuit
  async function agent1_shortCircuit(school, mockCallClaude) {
    if (school.gradUrl) return school.gradUrl;
    // Would call Claude — use mock
    return mockCallClaude ? await mockCallClaude() : school.url;
  }

  it("UC Davis returns known gradUrl without calling Claude", async () => {
    const ucdavis = SCHOOLS.find(s => s.name === "University of California Davis");
    let claudeCalled = false;
    const result = await agent1_shortCircuit(ucdavis, () => { claudeCalled = true; return "should-not-be-called"; });
    assertEqual(result, "https://entomology.ucdavis.edu/graduate-programs");
    assert(!claudeCalled, "Claude should NOT be called when gradUrl is known");
  });

  it("Hawaii returns known gradUrl without calling Claude", async () => {
    const hawaii = SCHOOLS.find(s => s.name === "University of Hawaii (CTAHR)");
    let claudeCalled = false;
    const result = await agent1_shortCircuit(hawaii, () => { claudeCalled = true; return "should-not-be-called"; });
    assertEqual(result, "https://cms.ctahr.hawaii.edu/peps/GRADUATE/Entomology");
    assert(!claudeCalled, "Claude should NOT be called when gradUrl is known");
  });

  it("Arizona falls through to Claude (no gradUrl)", async () => {
    const arizona = SCHOOLS.find(s => s.name === "University of Arizona");
    let claudeCalled = false;
    const result = await agent1_shortCircuit(arizona, async () => { claudeCalled = true; return "https://insects.arizona.edu/grad"; });
    assert(claudeCalled, "Claude SHOULD be called when gradUrl is not set");
    assertEqual(result, "https://insects.arizona.edu/grad");
  });

  it("gradUrl is returned verbatim (no mutation)", async () => {
    const school = { name: "Test", url: "https://a.edu", gradUrl: "https://a.edu/grad?x=1&y=2" };
    const result = await agent1_shortCircuit(school, null);
    assertEqual(result, "https://a.edu/grad?x=1&y=2");
  });

  it("school with empty string gradUrl falls through to Claude", async () => {
    const school = { name: "X", url: "https://x.edu", gradUrl: "" };
    let claudeCalled = false;
    await agent1_shortCircuit(school, async () => { claudeCalled = true; return "found"; });
    assert(claudeCalled, "Empty gradUrl should NOT short-circuit");
  });
});

// ═══════════════════════════════════════════════════════════
//  SUITE 16 — Minimise / Restore Toggle
// ═══════════════════════════════════════════════════════════
describe("16. Minimise / Restore Toggle", it => {

  // Local copy of toggleCard matching index.html implementation
  function toggleCard(id) {
    const card = document.getElementById(id);
    if (!card) return;
    const isMin = card.classList.toggle("minimised");
    const btn = document.getElementById("minbtn_" + id);
    if (btn) btn.textContent = isMin ? "□" : "_";
  }

  // Helper: build a minimal school card in the sandbox
  function makeCard(id) {
    const sb = document.getElementById("sandbox");
    const old = document.getElementById(id);
    if (old) old.remove();
    const card = document.createElement("div");
    card.className = "win school-card";
    card.id = id;
    card.innerHTML = `
      <div class="win-title" onclick="toggleCard('${id}')">
        <span>🎓 Test School</span>
        <div class="btns"><div class="win-btn" id="minbtn_${id}">_</div></div>
      </div>
      <div class="win-body" id="collapsible_${id}">
        <p>Some content here.</p>
      </div>`;
    sb.appendChild(card);
    return card;
  }

  it("card starts expanded (no minimised class)", () => {
    const card = makeCard("card_toggle_test_1");
    assert(!card.classList.contains("minimised"), "Card should start expanded");
  });

  it("toggleCard adds minimised class", () => {
    const card = makeCard("card_toggle_test_2");
    toggleCard("card_toggle_test_2");
    assert(card.classList.contains("minimised"), "Expected minimised class after toggle");
  });

  it("toggleCard removes minimised class on second call", () => {
    const card = makeCard("card_toggle_test_3");
    toggleCard("card_toggle_test_3");
    toggleCard("card_toggle_test_3");
    assert(!card.classList.contains("minimised"), "Expected minimised class removed after second toggle");
  });

  it("button text changes to □ when minimised", () => {
    makeCard("card_toggle_test_4");
    toggleCard("card_toggle_test_4");
    const btn = document.getElementById("minbtn_card_toggle_test_4");
    assertEqual(btn.textContent, "□");
  });

  it("button text reverts to _ when restored", () => {
    makeCard("card_toggle_test_5");
    toggleCard("card_toggle_test_5");
    toggleCard("card_toggle_test_5");
    const btn = document.getElementById("minbtn_card_toggle_test_5");
    assertEqual(btn.textContent, "_");
  });

  it("multiple toggles always return to correct state", () => {
    const card = makeCard("card_toggle_test_6");
    for (let i = 0; i < 6; i++) toggleCard("card_toggle_test_6");
    // 6 toggles = back to expanded
    assert(!card.classList.contains("minimised"), "Expected expanded after 6 toggles");
    const btn = document.getElementById("minbtn_card_toggle_test_6");
    assertEqual(btn.textContent, "_");
  });

  it("toggleCard does nothing when id not found", () => {
    // Should not throw
    let threw = false;
    try { toggleCard("card_nonexistent_xyz"); }
    catch(e) { threw = true; }
    assert(!threw, "toggleCard should handle missing id gracefully");
  });

  it("two separate cards toggle independently", () => {
    const cardA = makeCard("card_toggle_a");
    const cardB = makeCard("card_toggle_b");
    toggleCard("card_toggle_a");
    assert(cardA.classList.contains("minimised"), "Card A should be minimised");
    assert(!cardB.classList.contains("minimised"), "Card B should still be expanded");
  });

  it("minimised card has win-body hidden via CSS class", () => {
    const card = makeCard("card_toggle_test_css");
    toggleCard("card_toggle_test_css");
    // The .minimised class should be present — CSS hides .minimised .win-body
    assert(card.classList.contains("minimised"), "minimised class drives CSS visibility");
    const body = card.querySelector(".win-body");
    assert(body !== null, "win-body element still exists in DOM when minimised");
  });
});
